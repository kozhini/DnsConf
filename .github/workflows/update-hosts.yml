name: Update Telegram & WhatsApp Hosts

on:
  schedule:
    - cron: '0 3 * * *'  # Ежедневно в 3:00 UTC
  workflow_dispatch:  # Manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GH_TOKEN }}
        fetch-depth: 0  # Для git log
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests dnspython
    
    - name: Update hosts file
      env:
        GH_TOKEN: ${{ secrets.GH_TOKEN }}
      run: python .github/scripts/update_hosts.py
    
    - name: Commit and push changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add host
        if git diff --staged --quiet; then
          echo "No changes to commit"
        else
          git commit -m "Auto-update Telegram & WhatsApp hosts ($(date +'%Y-%m-%d'))"
          git push
        fi
    
    - name: Create Pull Request (if needed)
      uses: peter-evans/create-pull-request@v6
      if: failure()  # Fallback PR если push failed
      with:
        token: ${{ secrets.GH_TOKEN }}
        commit-message: "Auto-update hosts"
        title: "Auto-update Telegram & WhatsApp IPs"
        body: "Автоматическое обновление разделов Telegram/WhatsApp в host"
        branch: auto-update-hosts
